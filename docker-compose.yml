version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kanghan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-kanghan_root_pass}
      MYSQL_DATABASE: kanghan_pos
      MYSQL_USER: kanghan
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kanghan_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - kanghan_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanghan_pos
    restart: unless-stopped
    ports:
      - "3006:3000"
    environment:
      DATABASE_URL: mysql://kanghan:${MYSQL_PASSWORD:-kanghan_pass}@mysql:3306/kanghan_pos
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kanghan_network
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma db seed &&
        node server.js
      "

volumes:
  mysql_data:
    driver: local

networks:
  kanghan_network:
    driver: bridge
